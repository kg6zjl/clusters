name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'home-cluster/meshtastic-bot/**'
  pull_request:
    branches:
      - main
    paths:
      - 'home-cluster/meshtastic-bot/**'
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: registry.kube.stevearnett.com
  IMAGE_NAME: meshtastic-bot

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -q paho-mqtt requests meshtastic pytest

      - name: Run tests
        run: python -m pytest home-cluster/meshtastic-bot/src/test_bot.py -v

  build-push:
    name: Build and Push
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    env:
      PATH: /opt/tools/bin:/opt/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Docker auth
        run: |
          REGISTRY_HTPASSWD=$(kubectl get secret registry-auth -n registry -o jsonpath='{.data.htpasswd}' | base64 -d)
          REGISTRY_USER=$(echo "$REGISTRY_HTPASSWD" | cut -d: -f1)
          REGISTRY_PASS=$(kubectl get secret registry-auth -n registry -o jsonpath='{.data.REGISTRY_PASSWORD}' | base64 -d)
          mkdir -p ~/.docker
          echo "{\"auths\":{\"${{ env.REGISTRY }}\":{\"auth\":\"$(echo -n "$REGISTRY_USER:$REGISTRY_PASS" | base64)\"}}}" > ~/.docker/config.json

      - name: Build and push with Kaniko
        uses: int128/kaniko-action@v1
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          context: home-cluster/meshtastic-bot
          file: home-cluster/meshtastic-bot/Dockerfile
          cache: true

  deploy:
    name: Deploy
    needs: build-push
    runs-on: self-hosted
    env:
      PATH: /opt/tools/bin:/opt/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Restart deployment
        run: kubectl rollout restart deployment meshtastic-bot -n meshtastic

      - name: Watch rollout
        run: kubectl rollout status deployment meshtastic-bot -n meshtastic --timeout=60s
