name: CI Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'home-cluster/**'

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: python3 -m yamllint -c home-cluster/yamllint.yaml home-cluster/

  validate:
    name: Validate
    runs-on: self-hosted
    env:
      PATH: /opt/tools/bin:/opt/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /opt/tools/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Kustomize
        run: |
          cd home-cluster
          kubectl kustomize . 2>&1 > /dev/null && echo "Kustomize: OK" || { echo "Kustomize: FAILED"; exit 1; }

      - name: Helmfile lint
        run: |
          cd home-cluster
          helmfile template --quiet 2>&1 > /dev/null && echo "Helmfile: OK" || { echo "Helmfile: FAILED"; exit 1; }

  secrets:
    name: Secret Scan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          export PYTHONPATH=/opt/tools/bin
          /opt/tools/gitleaks protect --source . --exit-code 1
