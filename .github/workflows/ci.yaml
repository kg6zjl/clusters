name: CI Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'home-cluster/**'
      - 'renovate.json'
      - '.github/workflows/**'
      - '.gitleaks.toml'
      - '.pre-commit-config.yaml'

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: python3 -m yamllint -c home-cluster/yamllint.yaml home-cluster/

  validate:
    name: Validate
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          mv kustomize /opt/tools/bin/

      - name: Validate Kustomize
        run: |
          cd home-cluster
          kustomize build . 2>&1 > /dev/null && echo "Kustomize: OK" || { echo "Kustomize: FAILED"; exit 1; }

  secrets:
    name: Secret Scan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          /opt/tools/gitleaks protect --source . --exit-code 1

      - name: Run Trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Check Trufflehog result
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ -n "$(git log --oneline ${{ github.event.repository.default_branch }}..HEAD)" ]; then
            echo "New commits found, TruffleHog scan is required"
            exit 1
          else
            echo "No new commits in PR, skipping TruffleHog"
          fi
