name: Apply to Cluster

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'home-cluster/**'
      - '.github/workflows/apply.yaml'

jobs:
  apply:
    runs-on: self-hosted
    env:
      PATH: /opt/tools/bin:/opt/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /opt/tools/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate dockerconfigjson
        timeout-minutes: 1
        run: |
          REGISTRY_PASS=$(kubectl get secret registry-secrets -n registry -o jsonpath='{.data.REGISTRY_PASSWORD}' | base64 -d)
          REGISTRY_USER=$(kubectl get secret registry-secrets -n registry -o jsonpath='{.data.htpasswd}' | base64 -d | cut -d: -f1)
          AUTH=$(echo -n "$REGISTRY_USER:$REGISTRY_PASS" | base64)
          mkdir -p home-cluster/cluster-secrets
          echo "{\"auths\":{\"registry.kube.stevearnett.com\":{\"username\":\"$REGISTRY_USER\",\"password\":\"$REGISTRY_PASS\",\"auth\":\"$AUTH\"}}}" > home-cluster/cluster-secrets/.dockerconfigjson

      - name: Rollback pending releases
        run: |
          export PATH="/opt/tools/bin:/opt/tools:$PATH"
          echo "Checking for pending helm releases..."
          for i in {1..5}; do
            PENDING=$(helm list -A --pending 2>/dev/null | awk 'NR>1 {print $1, $2}')
            if [ -z "$PENDING" ]; then
              echo "No pending releases found"
              break
            fi
            echo "Attempt $i: Found pending releases:"
            echo "$PENDING"
            echo "$PENDING" | while read -r release namespace; do
              echo "Processing: $release in $namespace"
              helm rollback "$release" -n "$namespace" 2>&1 && echo "Rolled back: $release" && continue
              echo "Rollback failed for $release, retrying in 5s..."
              sleep 5
              helm rollback "$release" -n "$namespace" 2>&1 && echo "Rolled back: $release" && continue
              echo "Rollback failed again, uninstalling: $release"
              helm uninstall "$release" -n "$namespace" 2>&1 && echo "Uninstalled: $release"
            done
            [ $i -lt 5 ] && sleep 10
          done

      - name: Delete stale Flux CRDs
        run: |
          set +e
          for crd in helmcharts helmreleases helmrepositories ocirepositories; do
            echo "Checking flux CRDs with v1beta2 for $crd..."
            STORED=$(kubectl get crd ${crd}.source.toolkit.fluxcd.io -o jsonpath='{.status.storedVersions}' 2>/dev/null)
            if echo "$STORED" | grep -q v1beta2; then
              echo "Deleting stale CRD ${crd}.source.toolkit.fluxcd.io (has v1beta2)"
              kubectl delete crd ${crd}.source.toolkit.fluxcd.io --ignore-not-found
            fi
          done
          set -e

      - name: Apply changes
        run: |
          export PATH="/opt/tools/bin:/opt/tools:$PATH"
          cd home-cluster
          helmfile repos
          helmfile deps
          echo "Running helmfile sync with retry..."
          for i in {1..3}; do
            echo "Attempt $i of 3..."
            if helmfile sync 2>&1; then
              echo "helmfile sync succeeded"
              break
            fi
            echo "helmfile sync failed, retrying in 30s..."
            sleep 30
          done
          echo "Applying kustomize manifests..."
          kubectl apply -k . --server-side --force-conflicts
