name: Apply to Cluster

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'home-cluster/**'
      - '.github/workflows/apply.yaml'

jobs:
  apply:
    runs-on: self-hosted
    env:
      PATH: /opt/tools/bin:/opt/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /opt/tools/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate dockerconfigjson
        timeout-minutes: 1
        run: |
          REGISTRY_PASS=$(kubectl get secret registry-secrets -n registry -o jsonpath='{.data.REGISTRY_PASSWORD}' | base64 -d)
          REGISTRY_USER=$(kubectl get secret registry-secrets -n registry -o jsonpath='{.data.htpasswd}' | base64 -d | cut -d: -f1)
          AUTH=$(echo -n "$REGISTRY_USER:$REGISTRY_PASS" | base64)
          mkdir -p home-cluster/cluster-secrets
          echo "{\"auths\":{\"registry.kube.stevearnett.com\":{\"username\":\"$REGISTRY_USER\",\"password\":\"$REGISTRY_PASS\",\"auth\":\"$AUTH\"}}}" > home-cluster/cluster-secrets/.dockerconfigjson

      - name: Rollback pending releases
        run: |
          export PATH="/opt/tools/bin:/opt/tools:$PATH"
          helm list -A --pending 2>/dev/null | awk 'NR>1 {print $1, $2}' | \
            while read -r release namespace; do
              echo "Attempting to fix pending release: $release in $namespace"
              helm rollback "$release" -n "$namespace" 2>/dev/null && echo "Rolled back: $release" && continue
              echo "Rollback failed, attempting uninstall: $release in $namespace"
              helm uninstall "$release" -n "$namespace" 2>/dev/null && echo "Uninstalled: $release" && continue
              echo "Warning: Could not fix pending release $release in $namespace"
            done

      - name: Apply changes
        run: |
          export PATH="/opt/tools/bin:/opt/tools:$PATH"
          cd home-cluster
          helmfile repos
          helmfile deps
          helmfile sync
          kubectl apply -k .
