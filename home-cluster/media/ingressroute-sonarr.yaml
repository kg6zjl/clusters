apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: sonarr.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: sonarr
          port: 8989
  tls:
    secretName: wildcard-stevearnett-com-tls
