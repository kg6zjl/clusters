apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: radarr.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`radarr.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: radarr
          port: 7878
  tls:
    secretName: wildcard-stevearnett-com-tls