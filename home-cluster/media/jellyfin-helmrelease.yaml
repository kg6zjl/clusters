apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 1h
  chart:
    spec:
      chart: jellyfin/jellyfin
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: media
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    service:
      type: ClusterIP
      port: 8096
    ingress:
      enabled: false
    persistence:
      config:
        enabled: true
        size: 10Gi
      cache:
        enabled: true
        size: 50Gi
      media:
        enabled: true
        type: hostPath
        hostPath: /mnt/nas
    volumes:
      - name: dev-dri
        hostPath:
          path: /dev/dri
    volumeMounts:
      - name: dev-dri
        mountPath: /dev/dri
    podSecurityContext:
      supplementalGroups:
        - 44
        - 993
    securityContext:
      privileged: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
