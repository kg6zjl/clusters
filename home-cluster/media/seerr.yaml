---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seerr
  namespace: media
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/hostname: overseerr.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  tls:
  - hosts:
    - overseerr.kube.stevearnett.com
    secretName: wildcard-stevearnett-com-tls
  rules:
  - host: overseerr.kube.stevearnett.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: seerr
            port:
              number: 5055
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: microk8s-hostpath
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: media
  labels:
    alert-on-down: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: seerr
        image: seerr/seerr:latest
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
        env:
        - name: LOG_LEVEL
          value: info
        - name: TZ
          value: America/New_York
        ports:
        - containerPort: 5055
          protocol: TCP
        volumeMounts:
        - name: seerr-config
          mountPath: /app/config
      volumes:
      - name: seerr-config
        persistentVolumeClaim:
          claimName: seerr-config
---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: media
spec:
  selector:
    app: seerr
  ports:
  - port: 5055
    targetPort: 5055
    protocol: TCP
  type: ClusterIP
