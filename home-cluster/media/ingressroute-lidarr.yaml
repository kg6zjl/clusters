apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lidarr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: lidarr.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lidarr.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: lidarr
          port: 8686
  tls:
    secretName: wildcard-stevearnett-com-tls