apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: media-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: media-secrets
  data:
    - secretKey: username
      remoteRef:
        key: vpn-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: vpn-credentials
        property: password
