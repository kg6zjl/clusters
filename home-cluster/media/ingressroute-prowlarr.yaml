apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: prowlarr.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prowlarr.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: prowlarr
          port: 9696
  tls:
    secretName: wildcard-stevearnett-com-tls