apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
resources:
  - github.com/fluxcd/flux2/manifests/install?ref=v2.4.0&timeout=5m
patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all-flux-components
      spec:
        template:
          spec:
            securityContext:
              runAsUser: 1000
              fsGroup: 1000
    target:
      kind: Deployment
      labelSelector: app.kubernetes.io/part-of=flux
