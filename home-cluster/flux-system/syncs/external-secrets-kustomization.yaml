apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./home-cluster/external-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: clusters
  targetNamespace: external-secrets
  timeout: 2m0s
