apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-runners
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./home-cluster/github-runners
  prune: true
  sourceRef:
    kind: GitRepository
    name: clusters
  targetNamespace: github-runners
  timeout: 2m0s
