apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc-systems
  namespace: flux-system
spec:
  interval: 1h
  path: ./home-cluster/arc-systems
  prune: true
  sourceRef:
    kind: GitRepository
    name: clusters
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc-runners
  namespace: flux-system
spec:
  interval: 1h
  path: ./home-cluster/arc-runners
  prune: true
  sourceRef:
    kind: GitRepository
    name: clusters
  dependsOn:
    - name: arc-systems
