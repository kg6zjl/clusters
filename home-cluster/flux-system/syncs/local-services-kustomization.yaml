apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: local-services
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./home-cluster/local-services
  prune: true
  sourceRef:
    kind: GitRepository
    name: clusters
  targetNamespace: local-services
  timeout: 2m0s
