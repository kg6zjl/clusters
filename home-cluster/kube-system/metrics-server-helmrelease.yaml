apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server/metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: kube-system
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    args:
      - --kubelet-insecure-tls=true
