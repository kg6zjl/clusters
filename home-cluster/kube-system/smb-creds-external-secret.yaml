apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: smb-creds
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: smb-creds
  data:
    - secretKey: username
      remoteRef:
        key: nas-smb-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: nas-smb-credentials
        property: password
