apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 9.2.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    config:
      modules:
        http_2xx:
          prober: http
          http:
            follow_redirects: true
