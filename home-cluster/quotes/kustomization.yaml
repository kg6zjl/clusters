apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: quotes

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - pvc.yaml

secretGenerator:
  - name: quotes-registry-auth
    type: kubernetes.io/dockerconfigjson
    literals:
      - .dockerconfigjson={"auths":{"registry.kube.stevearnett.com":{"username":"$(registry_username)","password":"$(registry_password)"}}}
    envs:
      - .env

generatorOptions:
  disableNameSuffixHash: true
  
