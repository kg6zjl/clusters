apiVersion: batch/v1
kind: CronJob
metadata:
  name: auto-sync-wildcard-cert
  namespace: cert-manager
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cert-sync-sa
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  SOURCE_CERT=$(kubectl get secret wildcard-stevearnett-com-tls -n cert-manager -o jsonpath='{.metadata.resourceVersion}')
                  DEST_NS="frigate meshtastic media traefik"
                  
                  for ns in $DEST_NS; do
                    if kubectl get secret wildcard-stevearnett-com-tls -n $ns >/dev/null 2>&1; then
                      DEST_CERT=$(kubectl get secret wildcard-stevearnett-com-tls -n $ns -o jsonpath='{.metadata.resourceVersion}')
                      if [ "$SOURCE_CERT" != "$DEST_CERT" ]; then
                        echo "Syncing cert to $ns (source: $SOURCE_CERT, dest: $DEST_CERT)"
                        kubectl get secret wildcard-stevearnett-com-tls -n cert-manager -o yaml | sed "s/namespace: cert-manager/namespace: $ns/" | kubectl apply -f -
                        echo "Restarting traefik in $ns"
                        kubectl rollout restart deployment traefik -n traefik 2>/dev/null || true
                      fi
                    fi
                  done
                  echo "Done"