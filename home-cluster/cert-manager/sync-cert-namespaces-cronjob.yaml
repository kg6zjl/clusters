apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-wildcard-cert-namespaces
  namespace: cert-manager
spec:
  # Run daily at 3am - safety net in case reflector fails
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cert-sync-sa
          restartPolicy: OnFailure
          containers:
            - name: sync-certs
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Checking source certificate..."
                  kubectl get secret wildcard-stevearnett-com-tls -n cert-manager -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl x509 -noout -dates
                  
                  echo "Discovering namespaces with Ingress/IngressRoute using wildcard cert..."
                  # Get namespaces from standard Ingress resources
                  INGRESS_NS=$(kubectl get ingress -A -o jsonpath='{range .items[?(@.spec.tls[*].secretName=="wildcard-stevearnett-com-tls")]}{.metadata.namespace}{"\n"}{end}' 2>/dev/null || true)
                  
                  # Get namespaces from Traefik IngressRoute resources
                  INGRESSROUTE_NS=$(kubectl get ingressroute.traefik.io -A -o json 2>/dev/null | grep -B5 '"secretName": "wildcard-stevearnett-com-tls"' | grep '"namespace"' | sed 's/.*"namespace": "\([^"]*\)".*/\1/' | sort -u || true)
                  
                  # Combine and dedupe, always include traefik
                  NAMESPACES=$(echo -e "$INGRESS_NS\n$INGRESSROUTE_NS\ntraefik" | sort -u | grep -v '^$' | grep -v cert-manager)
                  
                  echo "Target namespaces: $NAMESPACES"
                  echo "Syncing certificate to all namespaces..."
                  for ns in $NAMESPACES; do
                    if kubectl get namespace "$ns" >/dev/null 2>&1; then
                      kubectl get secret wildcard-stevearnett-com-tls -n cert-manager -o yaml | \
                        sed "s/namespace: cert-manager/namespace: $ns/" | \
                        kubectl apply -f - >/dev/null 2>&1 && echo "  ✓ $ns" || echo "  ✗ $ns (failed)"
                    else
                      echo "  - $ns (namespace not found)"
                    fi
                  done
                  
                  echo "Done syncing certificates."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-sync-sa
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-sync-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["traefik.io", "traefik.containo.us"]
    resources: ["ingressroutes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-sync-rolebinding
subjects:
  - kind: ServiceAccount
    name: cert-sync-sa
    namespace: cert-manager
roleRef:
  kind: ClusterRole
  name: cert-sync-role
  apiGroup: rbac.authorization.k8s.io
