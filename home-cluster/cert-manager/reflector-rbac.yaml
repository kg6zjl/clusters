# Allow reflector to read secrets in cert-manager namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: reflector-read-secrets
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reflector-read-secrets-binding
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: reflector
    namespace: clustersecret
roleRef:
  kind: Role
  name: reflector-read-secrets
  apiGroup: rbac.authorization.k8s.io
---
# Allow reflector to create/update reflected secret copies in ALL namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: reflector-secret-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: reflector-secret-sync-binding
subjects:
  - kind: ServiceAccount
    name: reflector
    namespace: clustersecret
roleRef:
  kind: ClusterRole
  name: reflector-secret-sync
  apiGroup: rbac.authorization.k8s.io
