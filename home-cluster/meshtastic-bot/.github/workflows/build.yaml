name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: registry.kube.stevearnett.com
  IMAGE_NAME: meshtastic-bot

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -q paho-mqtt requests meshtastic pytest

      - name: Run tests
        run: python -m pytest src/test_bot.py -v

  build-push:
    name: Build and Push
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        run: podman login ${{ env.REGISTRY }} -u registry-user -p $(kubectl get secret registry-secrets -n registry -o jsonpath='{.data.registry_password}' | base64 -d)

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: meshtastic-bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy
    needs: build-push
    runs-on: self-hosted
    steps:
      - name: Restart deployment
        run: kubectl rollout restart deployment meshtastic-bot -n meshtastic

      - name: Watch rollout
        run: kubectl rollout status deployment meshtastic-bot -n meshtastic --timeout=60s
