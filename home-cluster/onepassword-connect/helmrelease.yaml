apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: 1password/connect
      version: 2.4.0
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    connect:
      create: true
      replicas: 1
      credentialsName: op-credentials
    operator:
      create: true
      token:
        name: onepassword-connect-token
        key: token
    service:
      type: ClusterIP
