apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-admin
  namespace: pihole
  annotations:
    external-dns.alpha.kubernetes.io/hostname: pihole.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pihole.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: pihole-web
          port: 80
  tls:
    secretName: wildcard-stevearnett-com-tls
