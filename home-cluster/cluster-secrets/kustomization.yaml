apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clustersecret

resources:
  - namespace.yaml
  - external-secrets.yaml

secretGenerator:
  - name: docker-registry-auth
    type: kubernetes.io/dockerconfigjson
    files:
      - .dockerconfigjson

generatorOptions:
  disableNameSuffixHash: true
