apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest
  namespace: speedtest
  annotations:
    external-dns.alpha.kubernetes.io/hostname: speedtest.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`speedtest.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: speedtest-tracker
          port: 80
  tls:
    secretName: wildcard-stevearnett-com-tls