apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: speedtest-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: speedtest-secrets
  data:
    - secretKey: SPEEDTEST_API_KEY
      remoteRef:
        key: speedtest-api-key
        property: password
