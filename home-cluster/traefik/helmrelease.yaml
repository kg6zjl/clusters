apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: 39.0.6
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    ports:
      web:
        port: 8000
        exposedPort: 80
      websecure:
        port: 8443
        exposedPort: 443
      meshmonitor-tcp:
        port: 4404
        exposedPort: 4404
        protocol: TCP
    ingressRoute:
      dashboard:
        enabled: true
    logs:
      general:
        level: INFO
      access:
        enabled: true
    providers:
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
