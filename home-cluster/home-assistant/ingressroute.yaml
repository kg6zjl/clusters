apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ha.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ha.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: home-assistant
          port: 8123
  tls:
    secretName: wildcard-stevearnett-com-tls
