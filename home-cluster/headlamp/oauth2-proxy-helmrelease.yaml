apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy-headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.3.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: headlamp
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      existingSecret: oauth2-proxy-secret
    extraArgs:
      provider: google
      authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
      upstream: "http://headlamp.headlamp.svc.cluster.local:4466"
      cookie-secure: "true"
      redirect-url: "https://headlamp.kube.stevearnett.com/oauth2/callback"
      http-address: "0.0.0.0:4180"
      whitelist-domain: ".stevearnett.com"
      cookie-domain: ".stevearnett.com"
      skip-provider-button: "false"
    extraVolumes:
      - name: authenticated-emails
        secret:
          secretName: oauth2-proxy-emails
    extraVolumeMounts:
      - name: authenticated-emails
        mountPath: /etc/oauth2-proxy
        readOnly: true
    containerPorts:
      http: 4180
    service:
      portNumber: 4180
      type: ClusterIP
      ports:
        - name: proxy
          port: 4180
          targetPort: 4180
        - name: metrics
          port: 44180
          targetPort: 44180
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "44180"
        prometheus.io/path: "/metrics"
    ingress:
      enabled: false
