apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: headlamp-restrictive
  namespace: headlamp
spec:
  podSelector:
    matchLabels:
      app: headlamp
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - protocol: TCP
      port: 4466
    - protocol: TCP
      port: 80
  egress:
  - {}
