apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    app: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      serviceAccountName: headlamp
      initContainers:
        - name: headlamp-plugins
          image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:latest
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /plugins/flux
              cp -r /plugins/* /plugins/flux/ 2>/dev/null || true
              chown -R 100:101 /plugins
          volumeMounts:
            - name: headlamp-plugins
              mountPath: /plugins
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:latest
          args:
            - -in-cluster
            - -oidc-skip-login
            - -plugins-dir=/headlamp/plugins
          ports:
            - containerPort: 4466
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: HEADLAMP_CONFIG_TRACING_ENABLED
              value: "true"
            - name: HEADLAMP_CONFIG_METRICS_ENABLED
              value: "true"
            - name: HEADLAMP_CONFIG_OTLP_ENDPOINT
              value: "otel-collector:4317"
            - name: HEADLAMP_CONFIG_SERVICE_NAME
              value: "headlamp"
            - name: HEADLAMP_CONFIG_SERVICE_VERSION
              value: "latest"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
          volumeMounts:
            - name: headlamp-plugins
              mountPath: /headlamp/plugins
          livenessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 30
            timeoutSeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 30
            timeoutSeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
      volumes:
        - name: headlamp-plugins
          emptyDir: {}
