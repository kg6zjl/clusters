apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`headlamp.kube.stevearnett.com`) && PathPrefix(`/oauth2`)
      kind: Rule
      services:
        - name: oauth2-proxy-headlamp
          port: 4180
    - match: Host(`headlamp.kube.stevearnett.com`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
      services:
        - name: headlamp
          port: 80
  tls:
    secretName: wildcard-stevearnett-com-tls
