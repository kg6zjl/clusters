apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controller-manager-secret
  namespace: arc-systems
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: controller-manager
  data:
    - secretKey: github_token
      remoteRef:
        key: github-runner-token
        property: password
