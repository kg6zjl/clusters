apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: meshmonitor-tcp
  namespace: meshtastic
  annotations:
    external-dns.alpha.kubernetes.io/hostname: meshmonitor.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - meshmonitor-tcp
  routes:
    - match: HostSNI(`meshmonitor.kube.stevearnett.com`)
      services:
        - name: meshmonitor
          port: 4404
          terminationDelay: 0
