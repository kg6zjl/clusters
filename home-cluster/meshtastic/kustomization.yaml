apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - network-policy.yaml
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml
  - ingressroute-tcp.yaml
  - dnsendpoint.yaml
  - external-secrets.yaml

generatorOptions:
  disableNameSuffixHash: true
