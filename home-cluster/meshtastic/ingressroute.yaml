apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: meshmonitor
  namespace: meshtastic
  annotations:
    external-dns.alpha.kubernetes.io/hostname: meshmonitor.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`meshmonitor.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: meshmonitor
          port: 3001
  tls:
    secretName: wildcard-stevearnett-com-tls