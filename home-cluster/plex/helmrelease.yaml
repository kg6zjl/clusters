apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: plex
spec:
  interval: 1h
  chart:
    spec:
      chart: plexinc/plex-media-server
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: plexinc
        namespace: plex
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    service:
      type: ClusterIP
    ingress:
      enabled: false
    persistence:
      config:
        enabled: true
        size: 10Gi
      data:
        enabled: true
        size: 100Gi
    extraVolumes:
      - name: media-tv
        hostPath:
          path: /mnt/nas/tv
          type: Directory
      - name: media-movies
        hostPath:
          path: /mnt/nas/movies
          type: Directory
      - name: media-music
        hostPath:
          path: /mnt/nas/music
          type: Directory
    extraVolumeMounts:
      - name: media-tv
        mountPath: /media/tv
      - name: media-movies
        mountPath: /media/movies
      - name: media-music
        mountPath: /media/music
    claimSecret:
      name: plex-claim-secret
      key: PLEX_CLAIM
