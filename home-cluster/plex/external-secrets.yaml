apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plex-claim-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: plex-claim-secret
  data:
    - secretKey: PLEX_CLAIM
      remoteRef:
        key: plex-claim
        property: password
