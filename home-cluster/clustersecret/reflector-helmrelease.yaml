apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: clustersecret
spec:
  interval: 1h
  chart:
    spec:
      chart: emberstack/reflector
      version: 10.0.22
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    updateOnChange: true
