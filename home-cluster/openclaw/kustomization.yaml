# OpenClaw - 100% Declarative
# All configuration lives in git. No manual pod exec edits.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - external-secrets.yaml
  - rbac.yaml
  - networkpolicy.yaml
  - deployment.yaml
  - ingressroute.yaml
  - usermap.yaml
