apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
    alert-on-down: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.3.13-1
        ports:
        - containerPort: 18789
          name: gateway
        env:
        - name: OLLAMA_BASE_URL
          value: "http://ollama.ai-services.svc.cluster.local:11434"
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GITHUB_TOKEN
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GITHUB_TOKEN
        - name: OPENCLAW_EXEC_ALLOWLIST
          value: "cat,ls,find,grep,echo,pwd,which,git"
        - name: SANDBOX_MODE
          value: "docker"
        command:
        - sh
        - -c
        - |
          openclaw config set agents.defaults.model.primary ollama/llama3.2:3b
          openclaw config set agents.defaults.model.secondary ollama/qwen2.5-coder:14b
          openclaw config set agents.sandbox.enabled true
          openclaw config set agents.sandbox.mode docker
          openclaw config set agents.github.enabled true
          openclaw config set agents.github.defaultRepo "kg6zjl/clusters"
          openclaw channels enable whatsapp
          openclaw gateway --port 18789
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/node/.openclaw
      volumes:
      - name: openclaw-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
spec:
  type: ClusterIP
  ports:
  - port: 18789
    targetPort: 18789
    protocol: TCP
    name: gateway
  selector:
    app: openclaw
