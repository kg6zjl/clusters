apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
    alert-on-down: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.3.13-1
        ports:
        - containerPort: 18789
          name: gateway
        env:
        - name: OLLAMA_BASE_URL
          value: "http://ollama-amd-02.ai-services.svc.cluster.local:11434"
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OLLAMA_API_KEY
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GATEWAY_TOKEN
        command:
        - sh
        - -c
        - |
          cat > /home/node/.openclaw/openclaw.json << 'EOF'
          {
            "gateway": {
              "mode": "local",
              "trustedProxies": ["10.0.0.0/8", "192.168.0.0/16"],
              "controlUi": {
                "allowInsecureAuth": true,
                "dangerouslyDisableDeviceAuth": true,
                "dangerouslyAllowHostHeaderOriginFallback": true
              }
            },
            "channels": {
              "whatsapp": {
                "dmPolicy": "open",
                "groupPolicy": "open",
                "allowFrom": ["*"]
              }
            },
            "plugins": {
              "entries": {
                "device-pair": {
                  "config": {
                    "publicUrl": "https://claw.kube.stevearnett.com"
                  }
                }
              }
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://ollama-amd-02.ai-services.svc.cluster.local:11434",
                  "models": []
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "llama3.2:1b"
                }
              }
            }
          }
          EOF
          openclaw gateway --port 18789 --bind lan --auth trusted-proxy
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/node/.openclaw
      volumes:
      - name: openclaw-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
spec:
  type: ClusterIP
  ports:
  - port: 18789
    targetPort: 18789
    protocol: TCP
    name: gateway
  selector:
    app: openclaw
