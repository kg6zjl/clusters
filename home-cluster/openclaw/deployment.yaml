apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
    alert-on-down: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:2026.3.13-1
        ports:
        - containerPort: 18789
          name: gateway
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENROUTER_API_KEY
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GATEWAY_TOKEN
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: GITHUB_TOKEN
        command:
        - sh
        - -c
        - |
          cat > /home/node/.openclaw/openclaw.json << EOF
          {
            "gateway": {
              "mode": "local",
              "auth": {
                "mode": "token",
                "token": "${OPENCLAW_GATEWAY_TOKEN}"
              },
              "trustedProxies": ["10.0.0.0/8", "192.168.0.0/16"],
              "controlUi": {
                "allowInsecureAuth": true,
                "dangerouslyDisableDeviceAuth": true,
                "dangerouslyAllowHostHeaderOriginFallback": true
              }
            },
            "channels": {
              "whatsapp": {
                "dmPolicy": "open",
                "groupPolicy": "open",
                "allowFrom": ["*"]
              }
            },
            "plugins": {
              "entries": {
                "device-pair": {
                  "config": {
                    "publicUrl": "https://claw.kube.stevearnett.com"
                  }
                }
              }
            },
            "models": {
              "providers": {
                "openrouter": {
                  "baseUrl": "https://openrouter.ai/api/v1",
                  "apiKey": "${OPENROUTER_API_KEY}",
                  "models": []
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openrouter/google/gemini-3-flash-preview"
                }
              }
            }
          }
          EOF
          openclaw gateway --port 18789 --bind lan
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 18789
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: openclaw-data
          mountPath: /home/node/.openclaw
        - name: user-files
          mountPath: /home/node/.openclaw/workspace/USER.md
          subPath: USER.md
      volumes:
      - name: openclaw-data
        persistentVolumeClaim:
          claimName: openclaw-data
      - name: user-files
        configMap:
          name: openclaw-user-files
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: microk8s-hostpath
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
  annotations:
    metallb.universe.tf/address-pool: default-addresspool
spec:
  type: LoadBalancer
  ports:
  - port: 18789
    targetPort: 18789
    protocol: TCP
    name: gateway
  selector:
    app: openclaw
