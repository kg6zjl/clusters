apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: openclaw-secrets
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: github-runner-token
        property: password
