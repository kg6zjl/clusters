apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: openclaw-secrets
  data:
    - secretKey: GATEWAY_TOKEN
      remoteRef:
        key: openclaw-gateway-token
        property: password
    - secretKey: OLLAMA_API_KEY
      remoteRef:
        key: openclaw-ollama-api-key
        property: password
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: openrouter-api-key
        property: password
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: github-runner-token
        property: password
