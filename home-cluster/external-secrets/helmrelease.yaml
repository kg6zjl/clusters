apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: ""
    certController:
      create: false
    webhook:
      timeoutSeconds: 60
      env:
        WEBHOOK_CLIENT_TIMEOUT: 30s
      certManager:
        enabled: true
        addInjectorAnnotations: true
        cert:
          issuerRef:
            group: cert-manager.io
            kind: ClusterIssuer
            name: selfsigned-issuer
