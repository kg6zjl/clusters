apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flux-allow-eso-egress
  namespace: flux-system
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: external-secrets
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eso-allow-all-namespaces-ingress
  namespace: external-secrets
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    - ipBlock:
        cidr: 192.168.1.0/24
    ports:
    - protocol: TCP
      port: 10250
    - protocol: TCP
      port: 443
