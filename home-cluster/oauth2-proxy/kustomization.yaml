apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth

resources:
  - network-policy.yaml
  - namespace.yaml
  - ingress-auth.yaml
  - ingress-dashboard.yaml
  - servicemonitor.yaml
  - external-secrets.yaml

commonAnnotations:
  reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
  reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "quotes,local-services,headlamp"
  reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "quotes,local-services,headlamp"

generatorOptions:
  disableNameSuffixHash: true
