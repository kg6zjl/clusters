apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: github-runners-allow-egress
  namespace: github-runners
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - {} # Allow all egress temporarily to unblock the runner builds
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: arc-systems
