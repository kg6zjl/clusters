# External Secrets - syncs GitHub PAT from 1Password to controller-manager secret
# The controller reads from controller-manager/github_token

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controller-manager-secret
  namespace: github-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: controller-manager
  data:
    - secretKey: github_token
      remoteRef:
        key: github-runner-token
        property: password
