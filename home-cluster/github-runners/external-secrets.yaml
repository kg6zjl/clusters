# External Secrets - syncs from 1Password home-cluster vault
# 1Password items must have a field labeled "password" in the root section

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-runner-secret
  namespace: github-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: github-runner-secret
  data:
    - secretKey: github_token
      remoteRef:
        key: github-runner-token
        property: password

---
# Registry credentials for image builds
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-auth
  namespace: github-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: registry-auth
  data:
    - secretKey: REGISTRY_PASSWORD
      remoteRef:
        key: registry-htpasswd
        property: docker-password
    - secretKey: REGISTRY_USERNAME
      remoteRef:
        key: registry-htpasswd
        property: username
