apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: github-runner
  namespace: github-runners
spec:
  replicas: 2
  template:
    spec:
      repository: kg6zjl/clusters
      labels:
        - self-hosted
        - kubernetes
      serviceAccountName: github-runner
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: actions-runner-controller
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: installer
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl wget tar bash python3 py3-pip

              # Install kubectl
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl && mv kubectl /opt/tools/

              # Install helm
              curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz | tar -zxf - -C /tmp && mv /tmp/linux-amd64/helm /opt/tools/ && rm -rf /tmp/linux-amd64

              # Install helmfile
              curl -fsSL https://github.com/helmfile/helmfile/releases/download/v0.168.0/helmfile_0.168.0_linux_amd64.tar.gz | tar -zxf - -C /opt/tools/ && chmod +x /opt/tools/helmfile

              # Install task
              curl -fsSL https://github.com/go-task/task/releases/download/v3.49.1/task_linux_amd64.tar.gz | tar -zxf - -C /opt/tools/ && chmod +x /opt/tools/task

              # Install yamllint
              pip3 install --no-cache-dir yamllint -t /opt/tools/bin/ --break-system-packages
              chmod +x /opt/tools/bin/yamllint /opt/tools/bin/_yaml/*.py /opt/tools/bin/yaml/*.py 2>/dev/null || true

              # Install gitleaks
              curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz | tar -xzf - -C /opt/tools/ && chmod +x /opt/tools/gitleaks

              ls -la /opt/tools/
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          volumeMounts:
            - mountPath: /opt/tools
              name: tools
      containers:
        - name: runner
          image: summerwind/actions-runner:latest
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          volumeMounts:
            - mountPath: /var/run
              name: docker-sock
            - mountPath: /opt/tools
              name: tools
            - mountPath: /runner/_work
              name: work
        - name: docker
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - mountPath: /var/run
              name: docker-sock
            - mountPath: /var/lib/docker
              name: docker-storage
      volumes:
        - name: tools
          emptyDir: {}
        - name: docker-sock
          emptyDir: {}
        - name: docker-storage
          emptyDir: {}
        - name: work
          emptyDir: {}
