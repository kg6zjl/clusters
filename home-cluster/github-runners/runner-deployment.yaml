apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: github-runner
  namespace: github-runners
spec:
  replicas: 2
  template:
    spec:
      priorityClassName: system-cluster-critical
      repository: kg6zjl/clusters
      labels:
        - self-hosted
        - kubernetes
      image: summerwind/actions-runner:latest
