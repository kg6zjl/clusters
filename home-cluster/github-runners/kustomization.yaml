apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: onepassword
    namespace: external-secrets
    envs:
      - onepassword.env
resources:
  - namespace.yaml
  - rbac.yaml
  - runner-deployment.yaml
  - hpa.yaml
  - external-secrets-namespace.yaml
  - external-secrets-store.yaml
  - external-secrets.yaml
