apiVersion: v1
kind: ServiceAccount
metadata:
  name: kaniko
  namespace: github-runners
imagePullSecrets:
  - name: registry-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kaniko
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kaniko
    namespace: github-runners
