apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  chart:
    spec:
      chart: renovate
      version: 46.79.2
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: flux-system
  values:
    cronjob:
      schedule: "0 * * * *"
    renovate:
      config: |
        {
          "platform": "github",
          "gitAuthor": "Renovate Bot <kg6zjl@users.noreply.github.com>",
          "repositories": ["kg6zjl/clusters"],
          "baseBranches": ["main"],
          "onboarding": false,
          "requireConfig": "optional",
          "enabledManagers": ["helmfile", "kubernetes", "helm-values"],
          "helmfile": {
            "fileMatch": ["helmfile\\.yaml$"]
          },
          "constraints": {
            "helm": "^3.15.0"
          }
        }
    existingSecret: renovate-github-token
    env:
      - name: LOG_LEVEL
        value: "info"
