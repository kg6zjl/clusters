apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  chart:
    spec:
      chart: renovate
      version: 46.79.2
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: renovate
  values:
    cronjob:
      schedule: "0 * * * *"
    renovate:
      existingConfigConfigMap: renovate-config
