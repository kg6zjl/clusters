apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-github-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: renovate-github-token
  data:
    - secretKey: RENOVATE_TOKEN
      remoteRef:
        key: github-runner-token
        property: password
