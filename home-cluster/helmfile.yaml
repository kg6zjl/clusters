repositories:
  - name: emberstack
    url: https://emberstack.github.io/helm-charts
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server
  - name: oauth2-proxy
    url: https://oauth2-proxy.github.io/manifests
  - name: stakater
    url: https://stakater.github.io/stakater-charts
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: plexinc
    url: https://plexinc.github.io/pms-docker/
  - name: csi-driver-smb
    url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
  - name: caddy
    url: https://caddyserver.github.io/ingress
  - name: cloudflare
    url: https://cloudflare.github.io/helm-charts
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: renovate
    url: https://docs.renovatebot.com/helm-charts
  - name: traefik
    url: https://traefik.github.io/charts
  - name: jellyfin
    url: https://jellyfin.github.io/jellyfin-helm
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: vmware-tanzu
    url: https://vmware-tanzu.github.io/helm-charts
  - name: actions-runner-controller
    url: https://actions-runner-controller.github.io/actions-runner-controller
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: 1password
    url: https://1password.github.io/connect-helm-charts
  - name: nvidia
    url: https://nvidia.github.io/gpu-operator
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: pihole-v6
    url: https://nunoferna.github.io/pihole-helm/
---
helmDefaults:
  historyMax: 3
---
environments:
  default:
---
templates:
---
releases:
  - name: reflector
    namespace: clustersecret
    chart: emberstack/reflector
    version: 10.0.21
    values:
      - updateOnChange: true
  - name: reloader
    namespace: kube-system
    chart: stakater/reloader
    version: 2.2.9
  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    version: 3.13.0
    values:
      - args:
          - --kubelet-insecure-tls=true
  - name: oauth2-proxy
    namespace: auth
    chart: oauth2-proxy/oauth2-proxy
    version: 10.1.4
    values:
      - config:
          existingSecret: oauth2-proxy-secret
        extraArgs:
          provider: google
          authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
          upstream: "http://headlamp.headlamp.svc.cluster.local:4466"
          cookie-secure: "true"
          redirect-url: "https://dashboard.kube.stevearnett.com/oauth2/callback"
          http-address: "0.0.0.0:4180"
          whitelist-domain: ".stevearnett.com"
          cookie-domain: ".stevearnett.com"
          skip-provider-button: "true"
        extraVolumes:
          - name: authenticated-emails
            secret:
              secretName: oauth2-proxy-emails
        extraVolumeMounts:
          - name: authenticated-emails
            mountPath: /etc/oauth2-proxy
            readOnly: true
        containerPorts:
          http: 4180
        service:
          portNumber: 4180
          type: ClusterIP
          ports:
            - name: proxy
              port: 4180
              targetPort: 4180
            - name: metrics
              port: 44180
              targetPort: 44180
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "44180"
            prometheus.io/path: "/metrics"
        ingress:
          enabled: false
  - name: oauth2-proxy-quotes
    namespace: quotes
    chart: oauth2-proxy/oauth2-proxy
    version: 10.1.4
    installed: false
    values:
      - config:
          existingSecret: oauth2-proxy-secret
        extraArgs:
          provider: google
          authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
          upstream: "http://quotes-app.quotes.svc.cluster.local:8000"
          cookie-secure: "true"
          redirect-url: "https://quotes.stevearnett.com/oauth2/callback"
          http-address: "0.0.0.0:4180"
          whitelist-domain: ".stevearnett.com"
          cookie-domain: ".stevearnett.com"
          skip-provider-button: "true"
        extraVolumes:
          - name: authenticated-emails
            secret:
              secretName: oauth2-proxy-emails
        extraVolumeMounts:
          - name: authenticated-emails
            mountPath: /etc/oauth2-proxy
            readOnly: true
        containerPorts:
          http: 4180
        service:
          portNumber: 4180
          type: ClusterIP
          ports:
            - name: proxy
              port: 4180
              targetPort: 4180
            - name: metrics
              port: 44180
              targetPort: 44180
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "44180"
            prometheus.io/path: "/metrics"
        ingress:
          enabled: false
  - name: oauth2-proxy-headlamp
    namespace: headlamp
    chart: oauth2-proxy/oauth2-proxy
    version: 10.1.4
    values:
      - config:
          existingSecret: oauth2-proxy-secret
        extraArgs:
          provider: google
          authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
          upstream: "http://headlamp.headlamp.svc.cluster.local:4466"
          cookie-secure: "true"
          redirect-url: "https://headlamp.kube.stevearnett.com/oauth2/callback"
          http-address: "0.0.0.0:4180"
          whitelist-domain: ".stevearnett.com"
          cookie-domain: ".stevearnett.com"
          skip-provider-button: "true"
        extraVolumes:
          - name: authenticated-emails
            secret:
              secretName: oauth2-proxy-emails
        extraVolumeMounts:
          - name: authenticated-emails
            mountPath: /etc/oauth2-proxy
            readOnly: true
        containerPorts:
          http: 4180
        service:
          portNumber: 4180
          type: ClusterIP
          ports:
            - name: proxy
              port: 4180
              targetPort: 4180
            - name: metrics
              port: 44180
              targetPort: 44180
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "44180"
            prometheus.io/path: "/metrics"
        ingress:
          enabled: false
  - name: external-dns
    namespace: kube-system
    chart: external-dns/external-dns
    version: 1.20.0
    values:
      - provider: cloudflare
        cloudflare:
          apiToken:
            secretName: cloudflare-api-creds-root
            secretKey: CLOUDFLARE_API_TOKEN
        domainFilters:
          - stevearnett.com
        txtOwnerId: home-cluster
        logLevel: debug
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-creds-root
                key: CLOUDFLARE_API_TOKEN
        extraArgs:
          - --source=crd
          - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
          - --crd-source-kind=DNSEndpoint
          - --source=ingress
        rbac:
          additionalPermissions:
            - apiGroups:
                - "externaldns.k8s.io"
              resources:
                - "dnsendpoints"
              verbs:
                - "get"
                - "watch"
                - "list"
        service:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "7979"
            prometheus.io/path: "/metrics"
  - name: kube-prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 82.12.0
    values:
      - crds:
          enabled: true
        prometheus:
          serviceMonitorSelectorNilUsesHelmValues: false
          prometheusSpec:
            retention: 10d
            additionalScrapeConfigs:
              - job_name: ugreen-dxp2800
                static_configs:
                  - targets:
                      - nas.stevearnett.com:9100
            ruleSelectorNilUsesHelmValues: false
            additionalRules:
              - name: disable-builtin-alerts
                groups:
                  - name: kubernetes-system-controller-manager
                    rules: []
                  - name: kubernetes-system-scheduler
                    rules: []
                  - name: kubernetes-system-kube-proxy
                    rules: []
        grafana:
          enabled: true
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: GRAFANA_ADMIN_PASSWORD
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
              jsonData:
                maxLines: 1000
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: 'default'
              group_by: [alertname]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
              - match:
                  severity: critical
                receiver: 'critical-alerts'
                continue: true
            receivers:
            - name: 'default'
              email_configs:
              - to: '{{ env "ALERT_MANAGER_TO_EMAIL" }}'
                from: '{{ env "ALERT_MANAGER_FROM_EMAIL" }}'
                smarthost: smtp.gmail.com:587
                auth_username: '{{ env "ALERT_MANAGER_SMTP_USERNAME" }}'
                auth_password: '{{ env "ALERT_MANAGER_SMTP_PASSWORD" }}'
              webhook_configs:
              - url: '{{ env "NTFY_URL" }}'
                send_resolved: true
            - name: 'critical-alerts'
              webhook_configs:
              - url: '{{ env "NTFY_URL" }}'
                send_resolved: true
            - name: 'null'
  - name: csi-driver-smb
    namespace: kube-system
    chart: csi-driver-smb/csi-driver-smb
  - name: plex
    namespace: plex
    chart: plexinc/plex-media-server
    version: "1.5.0"
    values:
      - service:
          type: ClusterIP
        ingress:
          enabled: false
        persistence:
          config:
            enabled: true
            size: 10Gi
          data:
            enabled: true
            size: 100Gi
        extraVolumes:
          - name: media-tv
            hostPath:
              path: /mnt/nas/tv
              type: Directory
          - name: media-movies
            hostPath:
              path: /mnt/nas/movies
              type: Directory
          - name: media-music
            hostPath:
              path: /mnt/nas/music
              type: Directory
        extraVolumeMounts:
          - name: media-tv
            mountPath: /media/tv
          - name: media-movies
            mountPath: /media/movies
          - name: media-music
            mountPath: /media/music
        claimSecret:
          name: plex-claim-secret
          key: PLEX_CLAIM
  - name: renovate
    namespace: renovate
    chart: renovate/renovate
    version: 46.77.0
    values:
      - cronjob:
          schedule: "0 * * * *"  # Run every hour
        renovate:
          config: |
            {
              "platform": "github",
              "gitAuthor": "Renovate Bot <kg6zjl@users.noreply.github.com>",
              "repositories": ["kg6zjl/clusters"],
              "baseBranches": ["main"],
              "onboarding": false,
              "requireConfig": "optional",
              "enabledManagers": ["helmfile", "kubernetes", "helm-values"],
              "helmfile": {
                "fileMatch": ["helmfile\\.yaml$"]
              },
              "constraints": {
                "helm": "^3.15.0"
              }
            }
        existingSecret: renovate-github-token
        env:
          - name: LOG_LEVEL
            value: "info"
  - name: traefik
    namespace: traefik
    chart: traefik/traefik
    version: 39.0.5
    values:
      - ports:
          web:
            port: 8000
            exposedPort: 80
          websecure:
            port: 8443
            exposedPort: 443
        service:
          type: LoadBalancer
        ingressRoute:
          dashboard:
            enabled: true
        logs:
          general:
            level: INFO
          access:
            enabled: true
        providers:
          kubernetesIngress:
            enabled: true
            publishedService:
              enabled: true
  - name: jellyfin
    namespace: media
    chart: jellyfin/jellyfin
    version: 2.7.0
    values:
      - service:
          type: ClusterIP
          port: 8096
        ingress:
          enabled: false
        persistence:
          config:
            enabled: true
            size: 10Gi
          cache:
            enabled: true
            size: 50Gi
          media:
            enabled: true
            type: hostPath
            hostPath: /mnt/nas
        # AMD GPU hardware transcoding (Ryzen 5 5700U Vega graphics)
        volumes:
          - name: dev-dri
            hostPath:
              path: /dev/dri
        volumeMounts:
          - name: dev-dri
            mountPath: /dev/dri
        podSecurityContext:
          supplementalGroups:
            - 44   # video group
            - 993  # render group
        securityContext:
          privileged: true
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
  - name: loki
    namespace: monitoring
    chart: grafana/loki
    version: 6.55.0
    values:
      - deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          limits_config:
            retention_period: 240h
          compactor:
            retention_enabled: true
            delete_request_store: filesystem
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        sidecar:
          enabled: false
          skipTlsVerify: true
  - name: promtail
    namespace: monitoring
    chart: grafana/promtail
    version: 6.17.1
    values:
      - config:
          clients:
            - url: http://loki:3100/loki/api/v1/push
  - name: pihole
    namespace: pihole
    chart: pihole-v6/pihole
    version: 1.2.1
    values:
      - timezone: "America/Los_Angeles"
        replicas: 1
        hostNetwork: false
        labels:
          alert-on-down: "true"
        pihole:
          # Web password
          web:
            existingSecret: pihole-web-password
            passwordSecretKey: PIHOLE_WEB_PASSWORD
            service:
              enabled: true
              type: ClusterIP
              ports:
                http: 80
                https: 443
          # Blocklists - declarative config for v6
          lists:
            adlists:
              - address: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
                comment: "StevenBlack Master"
              - address: "https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt"
                comment: "KADhosts"
              - address: "https://raw.githubusercontent.com/FadeMind/hosts.extras/master/add.Spam/hosts"
                comment: "FadeMind Spam"
              - address: "https://v.firebog.net/hosts/Easyprivacy.txt"
                comment: "Easyprivacy"
              - address: "https://v.firebog.net/hosts/Prigent-Ads.txt"
                comment: "Prigent Ads"
              - address: "https://raw.githubusercontent.com/DandelionSprout/adfilt/master/Alternate%20versions%20Anti-Malware%20List/AntiMalwareHosts.txt"
                comment: "AntiMalware"
              - address: "https://osint.digitalside.it/Threat-Intel/lists/latestdomains.txt"
                comment: "OSINT Threat Intel"
              - address: "https://s3.amazonaws.com/lists.disconnect.me/simple_tracking.txt"
                comment: "Disconnect Tracking"
              - address: "https://s3.amazonaws.com/lists.disconnect.me/simple_ad.txt"
                comment: "Disconnect Ads"
            whitelist:
              - domain: "clients4.google.com"
              - domain: "clients2.google.com"
              - domain: "s.youtube.com"
              - domain: "video-stats.l.google.com"
              - domain: "android.clients.google.com"
              - domain: "reminders-pa.googleapis.com"
              - domain: "firebaseremoteconfig.googleapis.com"
              - domain: "app-measurement.com"
              - domain: "dl.dropboxusercontent.com"
              - domain: "www.dropbox.com"
              - domain: "log.spotify.com"
              - domain: "apresolve.spotify.com"
            blacklist: []
            regex_whitelist: []
            regex_blacklist: []
          # FTL Configuration
          ftl:
            dns:
              upstreams:
                - "1.1.1.1"
                - "8.8.8.8"
              listeningMode: "all"
              service:
                enabled: true
                type: LoadBalancer
                loadBalancerIP: "192.168.1.240"
                externalTrafficPolicy: Local
                annotations:
                  metallb.universe.tf/allow-shared-ip: pihole-svc
            database:
              maxDBdays: 7
            webserver:
              port: "80,[::]:80,443s,[::]:443s"
            misc:
              privacylevel: 0
          # Disable DHCP
          dhcp:
            active: false
        # Persistence
        persistence:
          etcPihole:
            enabled: true
            accessMode: ReadWriteOnce
            size: 2Gi
        # Resources
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 512Mi
  - name: gpu-operator
    namespace: gpu-operator
    chart: nvidia/gpu-operator
    version: v25.10.1
    values:
      - operator:
          defaultRuntime: containerd
        driver:
          enabled: false  # Use pre-installed NVIDIA drivers
        toolkit:
          enabled: true
          env:
            - name: CONTAINERD_CONFIG
              value: /var/snap/microk8s/current/args/containerd-template.toml
            - name: CONTAINERD_SOCKET
              value: /var/snap/microk8s/common/run/containerd.sock
            - name: CONTAINERD_RUNTIME_CLASS
              value: nvidia
            - name: CONTAINERD_SET_AS_DEFAULT
              value: "true"
        devicePlugin:
          config:
            name: gpu-time-slicing
            default: any

  - name: spegel
    namespace: spegel
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.6.0
    values:
      - spegel:
          containerdSock: /var/snap/microk8s/common/run/containerd.sock
          containerdRegistryConfigPath: /var/snap/microk8s/current/args/certs.d
          containerdContentPath: /var/snap/microk8s/common/var/lib/containerd/io.containerd.content.v1.content
          containerdMirrorAdd: true
          mirroredRegistries:
            - https://docker.io
            - https://ghcr.io
            - https://quay.io
          additionalMirrorTargets:
            - https://registry.kube.stevearnett.com
  - name: actions-runner-controller
    namespace: github-runners
    chart: actions-runner-controller/actions-runner-controller
    version: 0.23.7
    values:
      - authSecret:
          enabled: true
          create: false
          name: github-runner-secret
        image:
          repository: summerwind/actions-runner-controller
        resources:
          limits:
            memory: 1Gi
        env:
          - name: REGISTRY_PASSWORD
            valueFrom:
              secretKeyRef:
                name: registry-secrets
                key: REGISTRY_PASSWORD
                optional: true
  - name: external-secrets
    namespace: external-secrets
    chart: external-secrets/external-secrets
    version: 2.1.0
    values:
      - installCRDs: true
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: ""
  - name: onepassword-connect
    namespace: external-secrets
    chart: 1password/connect
    version: 2.4.0
    values:
      - connect:
          create: true
          replicas: 1
        operator:
          create: true
        service:
          type: ClusterIP
