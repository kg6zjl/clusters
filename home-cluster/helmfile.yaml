repositories:
  - name: emberstack
    url: https://emberstack.github.io/helm-charts
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server
  - name: oauth2-proxy
    url: https://oauth2-proxy.github.io/manifests
  - name: stakater
    url: https://stakater.github.io/stakater-charts
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: plexinc
    url: https://plexinc.github.io/pms-docker/
  - name: csi-driver-smb
    url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
  - name: caddy
    url: https://caddyserver.github.io/ingress
  - name: cloudflare
    url: https://cloudflare.github.io/helm-charts
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: renovate
    url: https://docs.renovatebot.com/helm-charts
  - name: traefik
    url: https://traefik.github.io/charts
  - name: jellyfin
    url: https://jellyfin.github.io/jellyfin-helm
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: vmware-tanzu
    url: https://vmware-tanzu.github.io/helm-charts
  - name: actions-runner-controller
    url: https://actions-runner-controller.github.io/actions-runner-controller
  - name: external-secrets
    url: https://charts.external-secrets.io
  - name: 1password
    url: https://1password.github.io/connect-helm-charts
  - name: nvidia
    url: https://nvidia.github.io/gpu-operator
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: pihole-v6
    url: https://nunoferna.github.io/pihole-helm/
---
helmDefaults:
  historyMax: 3
  cleanupOnFail: true
  timeout: 900
---
environments:
  default:
---
templates:
---
releases:
  - name: reflector
    namespace: clustersecret
    chart: emberstack/reflector
    version: 10.0.22
    values:
      - updateOnChange: true
  - name: reloader
    namespace: kube-system
    chart: stakater/reloader
    version: 2.2.9
  - name: metrics-server
    namespace: kube-system
    chart: metrics-server/metrics-server
    version: 3.13.0
    values:
      - args:
          - --kubelet-insecure-tls=true
  - name: oauth2-proxy
    namespace: auth
    chart: oauth2-proxy/oauth2-proxy
    version: 10.3.0
    values:
      - config:
          existingSecret: oauth2-proxy-secret
        extraArgs:
          provider: google
          authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
          upstream: "http://headlamp.headlamp.svc.cluster.local:4466"
          cookie-secure: "true"
          redirect-url: "https://dashboard.kube.stevearnett.com/oauth2/callback"
          http-address: "0.0.0.0:4180"
          whitelist-domain: ".stevearnett.com"
          cookie-domain: ".stevearnett.com"
          skip-provider-button: "true"
        extraVolumes:
          - name: authenticated-emails
            secret:
              secretName: oauth2-proxy-emails
        extraVolumeMounts:
          - name: authenticated-emails
            mountPath: /etc/oauth2-proxy
            readOnly: true
        containerPorts:
          http: 4180
        service:
          portNumber: 4180
          type: ClusterIP
          ports:
            - name: proxy
              port: 4180
              targetPort: 4180
            - name: metrics
              port: 44180
              targetPort: 44180
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "44180"
            prometheus.io/path: "/metrics"
        ingress:
          enabled: false
  - name: oauth2-proxy-quotes
    namespace: quotes
    chart: oauth2-proxy/oauth2-proxy
    version: 10.3.0
    installed: false
    values:
      - config:
          existingSecret: oauth2-proxy-secret
        extraArgs:
          provider: google
          authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
          upstream: "http://quotes-app.quotes.svc.cluster.local:8000"
          cookie-secure: "true"
          redirect-url: "https://quotes.stevearnett.com/oauth2/callback"
          http-address: "0.0.0.0:4180"
          whitelist-domain: ".stevearnett.com"
          cookie-domain: ".stevearnett.com"
          skip-provider-button: "true"
        extraVolumes:
          - name: authenticated-emails
            secret:
              secretName: oauth2-proxy-emails
        extraVolumeMounts:
          - name: authenticated-emails
            mountPath: /etc/oauth2-proxy
            readOnly: true
        containerPorts:
          http: 4180
        service:
          portNumber: 4180
          type: ClusterIP
          ports:
            - name: proxy
              port: 4180
              targetPort: 4180
            - name: metrics
              port: 44180
              targetPort: 44180
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "44180"
            prometheus.io/path: "/metrics"
        ingress:
          enabled: false
  - name: oauth2-proxy-headlamp
    namespace: headlamp
    chart: oauth2-proxy/oauth2-proxy
    version: 10.3.0
    values:
      - config:
          existingSecret: oauth2-proxy-secret
        extraArgs:
          provider: google
          authenticated-emails-file: "/etc/oauth2-proxy/.env.authenticated-emails"
          upstream: "http://headlamp.headlamp.svc.cluster.local:4466"
          cookie-secure: "true"
          redirect-url: "https://headlamp.kube.stevearnett.com/oauth2/callback"
          http-address: "0.0.0.0:4180"
          whitelist-domain: ".stevearnett.com"
          cookie-domain: ".stevearnett.com"
          skip-provider-button: "true"
        extraVolumes:
          - name: authenticated-emails
            secret:
              secretName: oauth2-proxy-emails
        extraVolumeMounts:
          - name: authenticated-emails
            mountPath: /etc/oauth2-proxy
            readOnly: true
        containerPorts:
          http: 4180
        service:
          portNumber: 4180
          type: ClusterIP
          ports:
            - name: proxy
              port: 4180
              targetPort: 4180
            - name: metrics
              port: 44180
              targetPort: 44180
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "44180"
            prometheus.io/path: "/metrics"
        ingress:
          enabled: false
  - name: csi-driver-smb
    namespace: kube-system
    chart: csi-driver-smb/csi-driver-smb
  - name: plex
    namespace: plex
    chart: plexinc/plex-media-server
    version: "1.5.0"
    values:
      - service:
          type: ClusterIP
        ingress:
          enabled: false
        persistence:
          config:
            enabled: true
            size: 10Gi
          data:
            enabled: true
            size: 100Gi
        extraVolumes:
          - name: media-tv
            hostPath:
              path: /mnt/nas/tv
              type: Directory
          - name: media-movies
            hostPath:
              path: /mnt/nas/movies
              type: Directory
          - name: media-music
            hostPath:
              path: /mnt/nas/music
              type: Directory
        extraVolumeMounts:
          - name: media-tv
            mountPath: /media/tv
          - name: media-movies
            mountPath: /media/movies
          - name: media-music
            mountPath: /media/music
        claimSecret:
          name: plex-claim-secret
          key: PLEX_CLAIM
