---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-amd-01
  namespace: ai-services
  labels:
    app: ollama-amd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama-amd
      node: thinkcentre01
  template:
    metadata:
      labels:
        app: ollama-amd
        node: thinkcentre01
    spec:
      nodeSelector:
        kubernetes.io/hostname: thinkcentre01
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
          name: http
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_MODELS
          value: "/root/.ollama/models"
        - name: OLLAMA_VULKAN
          value: "true"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                sleep 5
                ollama pull qwen2.5-coder:3b
                ollama pull qwen2.5:3b
                ollama pull llama3.2:3b
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
        - name: dev-dri
          mountPath: /dev/dri
        - name: dev-kfd
          mountPath: /dev/kfd
        securityContext:
          privileged: true
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-amd-data-01
      - name: dev-dri
        hostPath:
          path: /dev/dri
      - name: dev-kfd
        hostPath:
          path: /dev/kfd
---
