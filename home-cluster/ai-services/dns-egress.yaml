apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-services-allow-dns
  namespace: ai-services
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
