apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-services

resources:
  - dns-egress.yaml
  - namespace.yaml
  - wyoming-whisper.yaml
  - ollama.yaml
  - ollama-amd.yaml
  - open-webui.yaml
  - ingressroute.yaml
  - dnsendpoint.yaml
  - service-comfy.yaml
  - deployment-comfy.yaml
  - middleware-comfy.yaml
  - ingressroute-comfy.yaml
  - dnsendpoint-comfy.yaml
  - pigallery2.yaml
  - ingressroute-pigallery2.yaml
  - dnsendpoint-pigallery2.yaml
  - external-secrets.yaml
  - external-secrets-pigallery2.yaml

patches:
  - target:
      group: externaldns.k8s.io
      version: v1alpha1
      kind: DNSEndpoint
      name: chat
    patch: |-
  - op: replace
        path: /metadata/namespace
        value: kube-system
  - target:
      group: externaldns.k8s.io
      version: v1alpha1
      kind: DNSEndpoint
      name: pigallery2
    patch: |-
  - op: replace
        path: /metadata/namespace
        value: kube-system
