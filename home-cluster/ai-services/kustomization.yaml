apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-services

resources:
  - network-policy.yaml
  - namespace.yaml
  - wyoming-whisper.yaml
  - open-webui.yaml
  - ingressroute.yaml
  - dnsendpoint.yaml
  - service-comfy.yaml
  - deployment-comfy.yaml
  - middleware-comfy.yaml
  - ingressroute-comfy.yaml
  - dnsendpoint-comfy.yaml
  - external-secrets.yaml

patches:
  - target:
      group: externaldns.k8s.io
      version: v1alpha1
      kind: DNSEndpoint
      name: chat
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: kube-system
