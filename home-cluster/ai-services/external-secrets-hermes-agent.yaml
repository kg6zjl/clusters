apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: hermes-agent-secrets
  data:
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: hermes-agent-api-key
        property: password
