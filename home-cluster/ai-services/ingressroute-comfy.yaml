---
# IngressRoute for Comfy
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: comfy
  namespace: ai-services
  annotations:
    external-dns.alpha.kubernetes.io/hostname: comfy.kube.stevearnett.com
    external-dns.alpha.kubernetes.io/target: kube.stevearnett.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`comfy.kube.stevearnett.com`)
      kind: Rule
      services:
        - name: comfy-local
          port: 8080
          scheme: http
  tls:
    secretName: wildcard-stevearnett-com-tls